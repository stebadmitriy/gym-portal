<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded rectangle -->
  <rect width="192" height="192" rx="36" ry="36" fill="url(#bgGrad)"/>

  <!-- Barbell: center horizontal bar -->
  <rect x="51" y="88" width="90" height="16" rx="8" fill="white"/>

  <!-- Left outer weight plate -->
  <rect x="33" y="70" width="20" height="52" rx="7" fill="white"/>

  <!-- Left inner collar -->
  <rect x="53" y="77" width="7" height="38" rx="3" fill="white" opacity="0.7"/>

  <!-- Right inner collar -->
  <rect x="132" y="77" width="7" height="38" rx="3" fill="white" opacity="0.7"/>

  <!-- Right outer weight plate -->
  <rect x="139" y="70" width="20" height="52" rx="7" fill="white"/>

  <!-- GP text -->
  <text
    x="96"
    y="154"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="30"
    font-weight="900"
    text-anchor="middle"
    fill="white"
    letter-spacing="3"
  >GP</text>
</svg>
